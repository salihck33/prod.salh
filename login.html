<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PROD.SALH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #080808;
      --surface: #111;
      --gold: #c8a96e;
      --gold2: #e8c98a;
      --white: #f5f5f7;
      --gray: #888;
      --card: #161616;
    }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      padding: 18px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: absolute;
      top: 0; width: 100%; z-index: 10;
    }
    .nav-logo {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none }
    .nav-links a {
      color: rgba(245, 245, 247, 0.7);
      text-decoration: none; font-size: .85rem; letter-spacing: .5px; transition: color .3s;
    }
    .nav-links a:hover { color: var(--gold) }
    
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      background: radial-gradient(circle at center, rgba(200, 169, 110, 0.05) 0%, transparent 60%);
    }
    .login-card {
      background: rgba(22, 22, 22, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--gray);
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: rgba(245, 245, 247, 0.8);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--white);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    .form-control:focus {
      outline: none;
      border-color: rgba(200, 169, 110, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      font-size: 0.8rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray);
      cursor: pointer;
    }
    .forgot-pwd {
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .forgot-pwd:hover {
      opacity: 0.8;
    }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #080808;
      border: none;
      border-radius: 100px;
      padding: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(200, 169, 110, 0.2);
    }
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--gray);
    }
    .signup-link a {
      color: var(--white);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .signup-link a:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">PROD.SALH</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="track.html">Covers</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to access your account</p>
      </div>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-pwd">Forgot password?</a>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      <div class="signup-link">
        Don't have an account? <a href="#">Create one</a>
      </div>
    </div>
  </div>
</body>
</html>
